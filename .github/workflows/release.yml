# Release automation for ArtfulType.
#
# Triggered by pushing a version tag (e.g. `v0.1.4-alpha`). It builds the
# 68k application and every bootable disk image, then publishes a GitHub
# release with them attached. The whole pipeline runs on Linux -- the
# bootable images are formatted and *blessed* in software (see
# build-boot-images.sh and tools/bless_hfs.py), so no Mac is involved.
#
# Two runner environments are used deliberately:
#   * build-app runs in the Retro68 container, which is the only place the
#     m68k cross-toolchain lives.
#   * build-disks runs on a native ubuntu-latest runner. The disk tooling
#     (hfsutils via apt, plus djjr) works there, whereas djjr's runtime
#     traps (SIGILL) against the Retro68 container's older system libraries.
#
# Published assets:
#   ArtfulType.bin          the application itself (MacBinary).
#   ArtfulType-800K.dsk     bootable 800K floppy, raw HFS (System 6.0.8 + app).
#   ArtfulType-800K.image   the same floppy in DiskCopy 4.2 format.
#   ArtfulType-20MB.dsk     bootable 20 MB volume, for Mini vMac.
#   HD1_ArtfulType.hda      bootable 20 MB BlueSCSI/PiSCSI device image.
#   START_HERE.md           the getting-started guide.
#
# The disk images embed Apple System 6.0.8; see disk-base/README.md.
name: Release

on:
  push:
    tags: [ 'v*' ]
  # Allow a dry run against the current default branch without tagging.
  workflow_dispatch:

permissions:
  contents: write        # required to create the release

env:
  DJJR_URL: https://diskjockey.onegeekarmy.eu/files/djjr/djjr-linux-x86_64.tar.gz

jobs:
  build-app:
    name: Build the 68k application
    runs-on: ubuntu-latest
    # Our Retro68 fork's image ships Apple's MPW/Universal interfaces as the
    # toolchain default, which the 382d4cf port requires (the stock
    # autc04/retro68 ships multiversal and won't compile this source). Public,
    # so no registry login is needed.
    container: ghcr.io/matthewdeaves/retro68:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ArtfulType.bin
        run: |
          cmake -S app -B app/build \
            -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/m68k-apple-macos/cmake/retro68.toolchain.cmake
          cmake --build app/build
          test -f app/build/ArtfulType.bin
      - uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: app/build/ArtfulType.bin

  build-disks:
    name: Build bootable disk images
    needs: build-app
    runs-on: ubuntu-latest        # native runner: hfsutils + djjr both work here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-binary
          path: app/build

      - name: Install hfsutils + djjr
        run: |
          set -eu
          # A broken third-party apt repo on the hosted runner (e.g.
          # packages.microsoft.com returning an invalid InRelease) makes
          # `apt-get update` exit non-zero and, under `set -e`, aborts before
          # hfsutils installs (hformat then "not found on PATH" downstream).
          # hfsutils lives in Ubuntu's universe repo, so drop the non-Ubuntu
          # lists first and `update` only hits archive.ubuntu.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/*microsoft* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y hfsutils
          curl -fsSL -o /tmp/djjr.tgz "$DJJR_URL"
          sudo tar -xzf /tmp/djjr.tgz -C /usr/local/bin djjr
          sudo chmod +x /usr/local/bin/djjr
          djjr --version

      - name: Build the bootable disk images
        run: |
          set -eu
          ./build-boot-images.sh
          cp app/build/ArtfulType.bin dist/ArtfulType.bin
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  publish:
    name: Publish GitHub release
    needs: build-disks
    runs-on: ubuntu-latest
    # Only publish for real tag pushes. A workflow_dispatch run (branch ref)
    # builds and uploads the artifact but stops here -- a genuine dry run.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Create the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: true
          generate_release_notes: true
          body: |
            Distraction-free Markdown editor for classic 68k Macs (System 6/7).

            **Ready-to-run disk images** (all boot System 6.0.8 with ArtfulType; volume named "ArtfulType"):
            - `HD1_ArtfulType.hda` — bootable BlueSCSI/PiSCSI device image for real hardware. The `HD1_` prefix matches BlueSCSI's SCSI-ID-1 convention, so drop it on the SD card as-is.
            - `ArtfulType-20MB.dsk` — bootable 20 MB volume for Mini vMac.
            - `ArtfulType-800K.dsk` / `ArtfulType-800K.image` — bootable 800K floppy (raw HFS, and the DiskCopy 4.2 form) for Mini vMac, a flux floppy writer, or Disk Copy 4.2.

            **Also attached:**
            - `ArtfulType.bin` — the application on its own (MacBinary), to add to an existing System volume.
            - `START_HERE.md` — the getting-started guide, written in ArtfulType.

            The disk images are formatted and blessed in software on Linux (both
            the floppy and the 20 MB volume the same way, via `tools/bless_hfs.py`),
            and CI asserts their on-disk boot structures. The **800K floppy is
            boot-tested on a real Macintosh SE** — it boots System 6.0.8 and
            launches ArtfulType; the 20 MB `.hda` is structurally verified and
            emulator-mount-validated. New this release: a `tools/floppy-writer`
            app that writes a bootable floppy on a bare Mac from the launcher
            alone. The images embed Apple System 6.0.8 — see `disk-base/README.md`
            for provenance.
